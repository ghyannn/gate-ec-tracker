<!DOCTYPE html>
<html>
<head>
    <title>GATE EC Tracker</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1> GATE EC Syllabus Tracker</h1>

<div class="countdown">
    <div>
        <span id="examdaysleft">0</span>
        <p>Days</p>
    </div>
    <div>
        <span id="hour">0</span>
        <p>Hours</p>
    </div>
    <div>
        <span id="minute">0</span>
        <p>Min</p>
    </div>
</div>

<div class="dashboard">
    <div id="ECsubjects"></div>
</div>

<script src="main.js"></script>

</body>
</html>
