<!DOCTYPE html>
<html>
<head>
    <title>GATE EC Tracker</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1> GATE EC Syllabus Tracker</h1>

<!-- Countdown -->
<div class="countdown">
    <div>
        <span id="days">0</span>
        <p>Days</p>
    </div>
    <div>
        <span id="hours">0</span>
        <p>Hours</p>
    </div>
    <div>
        <span id="minutes">0</span>
        <p>Min</p>
    </div>
</div>

<!-- Main Layout -->
<div class="dashboard">

    <!-- Subjects -->
    <div id="subjects"></div>

    <!-- Overall Progress -->
    <div class="overall">
        <h2>Overall Progress</h2>

        <div class="donut">
            <span id="overallPercent">0%</span>
        </div>

        <p>🟢 Completed | ⚪ Remaining</p>
    </div>

</div>

<script src="main.js"></script>

</body>
</html>
